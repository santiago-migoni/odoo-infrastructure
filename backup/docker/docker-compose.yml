name: odoo-infrastructure-backup
services:
  backup:
    build:
      context: ../..
      dockerfile: backup/docker/Dockerfile
    env_file: ../env/.env.backup
    entrypoint: ["sleep", "infinity"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "test -f /backups/.last-success && [ $(($(date +%s) - $(stat -c %Y /backups/.last-success))) -lt 93600 ]"]
      interval: 1h
      timeout: 10s
      retries: 1
      start_period: 5m
    volumes:
      - odoo-data:/filestore:ro
      - /srv/odoo-backups:/backups
      - /srv/node-exporter-textfile:/textfile-collector
    mem_limit: 1g
    cpus: 1.0
    networks:
      - internal

networks:
  internal:
    external: true
    name: odoo-shared

volumes:
  odoo-data:
    external: true
    name: odoo-data
