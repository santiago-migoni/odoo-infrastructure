http:
  routers:
    odoo-ws:
      rule: "Host(`odoo.miempresa.com`) && PathPrefix(`/websocket`)"
      priority: 100
      service: odoo-ws
      middlewares:
        - odoo-buffering

    odoo:
      rule: "Host(`odoo.miempresa.com`)"
      priority: 1
      service: odoo
      middlewares:
        - odoo-buffering

    odoo-staging-ws:
      rule: "Host(`staging.miempresa.com`) && PathPrefix(`/websocket`)"
      priority: 100
      service: odoo-staging-ws
      middlewares:
        - odoo-buffering

    odoo-staging:
      rule: "Host(`staging.miempresa.com`)"
      priority: 1
      service: odoo-staging
      middlewares:
        - odoo-buffering

  services:
    odoo-ws:
      loadBalancer:
        servers:
          - url: "http://odoo:8072"

    odoo:
      loadBalancer:
        servers:
          - url: "http://odoo:8069"

    odoo-staging-ws:
      loadBalancer:
        servers:
          - url: "http://odoo-staging:8072"

    odoo-staging:
      loadBalancer:
        servers:
          - url: "http://odoo-staging:8069"

  middlewares:
    odoo-buffering:
      buffering:
        maxRequestBodyBytes: 209715200
