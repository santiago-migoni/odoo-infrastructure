global:
  scrape_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]

  - job_name: postgres-exporter-prod
    static_configs:
      - targets: ["postgres-exporter-prod:9187"]

  - job_name: postgres-exporter-staging
    static_configs:
      - targets: ["postgres-exporter-staging:9187"]
