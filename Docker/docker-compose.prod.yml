name: odoo-infrastructure-prod
services:
  db:
    image: postgres:16-alpine
    env_file: ../env/.env.prod
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_INITDB_ARGS: "--locale-provider=icu --icu-locale=en-US"
    volumes:
      - db-data:/var/lib/postgresql/data
    command: >
      postgres
      -c shared_buffers=1536MB
      -c work_mem=64MB
      -c max_connections=100
      -c random_page_cost=1.1
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    mem_limit: 4.5g
    cpus: 2.0
    networks:
      - internal

  pgbouncer:
    image: edoburu/pgbouncer:1.22.1-p0
    env_file: ../env/.env.prod
    environment:
      DB_HOST: db
      DB_PORT: 5432
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: 20
      MAX_CLIENT_CONN: 200
      LISTEN_PORT: 6432
      AUTH_TYPE: scram-sha-256
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "127.0.0.1", "-p", "6432"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    mem_limit: 256m
    cpus: 0.5
    networks:
      - internal

  odoo:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    env_file: ../env/.env.prod
    environment:
      HOST: pgbouncer
      PORT: 6432
    volumes:
      - odoo-data:/var/lib/odoo
      - ../config/odoo.conf:/etc/odoo/odoo.conf:ro
    depends_on:
      pgbouncer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8069/web/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    mem_limit: 8g
    cpus: 4.0
    networks:
      - internal

networks:
  internal:
    external: true
    name: odoo-shared

volumes:
  db-data:
  odoo-data:
    external: true
    name: odoo-data
