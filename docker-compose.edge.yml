services:
  traefik:
    image: traefik:v3.7.7
    volumes:
      - ./config/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./config/traefik-dynamic.yml:/etc/traefik/traefik-dynamic.yml:ro
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.5
    networks:
      - internal

  cloudflared:
    image: cloudflare/cloudflared:2026.7.1
    command: tunnel run
    env_file: .env.edge
    depends_on:
      traefik:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.5
    networks:
      - internal

networks:
  internal:
    external: true
    name: odoo-shared
