name: odoo-infrastructure-staging
services:
  db:
    image: postgres:16-alpine
    env_file: ../env/.env.staging
    environment:
      PGDATA: /var/lib/postgresql/data/pgdata
      POSTGRES_DB: odoo_staging
      POSTGRES_INITDB_ARGS: "--locale-provider=icu --icu-locale=en-US"
    volumes:
      - db-data-staging:/var/lib/postgresql/data
    command: >
      postgres
      -c shared_buffers=512MB
      -c work_mem=64MB
      -c max_connections=100
      -c random_page_cost=1.1
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    mem_limit: 1.5g
    cpus: 1.0
    networks:
      - staging

  pgbouncer:
    image: edoburu/pgbouncer:1.22.1-p0
    env_file: ../env/.env.staging
    environment:
      DB_HOST: db
      DB_PORT: 5432
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: 5
      MAX_CLIENT_CONN: 50
      LISTEN_PORT: 6432
      AUTH_TYPE: scram-sha-256
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "127.0.0.1", "-p", "6432"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.25
    networks:
      - staging

  odoo-staging:
    image: odoo-staging:${TAG:-dev}
    build:
      context: ../..
      dockerfile: staging/docker/Dockerfile
    env_file: ../env/.env.staging
    environment:
      HOST: pgbouncer
      PORT: 6432
    volumes:
      - odoo-data-staging:/var/lib/odoo
      - ../config/odoo-staging.conf:/etc/odoo/odoo.conf:ro
    depends_on:
      pgbouncer:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8069/web/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    mem_limit: 2g
    cpus: 1.5
    networks:
      - staging

  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    env_file: ../env/.env.staging
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 64m
    cpus: 0.25
    networks:
      - staging

networks:
  staging:
    external: true
    name: staging-net

volumes:
  db-data-staging:
    name: db-data-staging
  odoo-data-staging:
    name: odoo-data-staging
