name: odoo-infrastructure-monitoring
services:
  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
    volumes:
      - ../config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    restart: unless-stopped
    mem_limit: 2g
    cpus: 1.0
    networks:
      - internal
      - staging

  grafana:
    image: grafana/grafana:11.4.0
    env_file: ../env/.env.monitoring
    volumes:
      - ../config/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped
    mem_limit: 1.5g
    cpus: 0.5
    networks:
      - internal

  loki:
    image: grafana/loki:3.3.2
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ../config/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    restart: unless-stopped
    mem_limit: 2g
    cpus: 0.5
    networks:
      - internal

  promtail:
    image: grafana/promtail:3.3.2
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ../config/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail-positions:/tmp/positions
    depends_on:
      - loki
    restart: unless-stopped
    mem_limit: 128m
    cpus: 0.25
    networks:
      - internal

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    volumes:
      - /:/rootfs:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    restart: unless-stopped
    mem_limit: 300m
    cpus: 0.3
    networks:
      - internal

  node-exporter:
    image: quay.io/prometheus/node-exporter:v1.8.2
    command:
      - --path.rootfs=/host
      - --collector.textfile.directory=/textfile-collector
    volumes:
      - /:/host:ro,rslave
      - /srv/node-exporter-textfile:/textfile-collector:ro
    restart: unless-stopped
    mem_limit: 200m
    cpus: 0.2
    networks:
      - internal

  postgres-exporter-prod:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.15.0
    env_file: ../env/.env.monitoring
    restart: unless-stopped
    mem_limit: 64m
    cpus: 0.25
    networks:
      - internal

networks:
  internal:
    external: true
    name: prod-net
  staging:
    external: true
    name: staging-net

volumes:
  prometheus-data:
  grafana-data:
  loki-data:
  promtail-positions:
